{% extends 'finance/base.html' %}
{% block title %}Вход — GlassFinance{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card">
        <h2>Вход в аккаунт</h2>
        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
                <div class="error-msg">Неверное имя пользователя или пароль.</div>
            {% endif %}
            <div class="form-group">
                <label for="id_username">Имя пользователя</label>
                <input type="text" name="username" id="id_username" required placeholder="Введите имя пользователя">
            </div>
            <div class="form-group">
                <label for="id_password">Пароль</label>
                <input type="password" name="password" id="id_password" required placeholder="Введите пароль">
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
        </form>
        <p class="auth-footer">Ещё нет аккаунта? <a href="{% url 'finance:register' %}">Зарегистрируйтесь здесь</a></p>
    </div>
</div>
{% endblock %}
