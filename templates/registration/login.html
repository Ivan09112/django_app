{% extends 'finance/base.html' %}
{% block title %}Sign In - GlassFinance{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card">
        <h2>Sign In</h2>
        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
                <div class="error-msg">Invalid username or password.</div>
            {% endif %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" required placeholder="Enter username">
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" required placeholder="Enter password">
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>
        <p class="auth-footer">Don't have an account? <a href="{% url 'finance:register' %}">Register here</a></p>
    </div>
</div>
{% endblock %}
