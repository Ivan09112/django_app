{% extends 'finance/base.html' %}
{% block title %}Регистрация — GlassFinance{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="glass-card auth-card">
        <h2>Регистрация</h2>
        {% if errors %}
            {% for error in errors %}
                <div class="error-msg">{{ error }}</div>
            {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Имя пользователя</label>
                <input type="text" name="username" id="id_username" required placeholder="Выберите имя пользователя">
            </div>
            <div class="form-group">
                <label for="id_email">Электронная почта</label>
                <input type="email" name="email" id="id_email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label for="id_password">Пароль</label>
                <input type="password" name="password" id="id_password" required placeholder="Создайте пароль">
            </div>
            <div class="form-group">
                <label for="id_password_confirm">Подтверждение пароля</label>
                <input type="password" name="password_confirm" id="id_password_confirm" required placeholder="Повторите пароль">
            </div>
            <button type="submit" class="btn btn-primary">Создать аккаунт</button>
        </form>
        <p class="auth-footer">Уже есть аккаунт? <a href="{% url 'finance:login' %}">Войти здесь</a></p>
    </div>
</div>
{% endblock %}
